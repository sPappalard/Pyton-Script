name: Run Selected Script

on:
  workflow_dispatch:
    inputs:
      script_name:
        description: "Name of the script to run (e.g., script1.py)"
        required: true

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Run selected script
        run: python ${{ github.event.inputs.script_name }}
